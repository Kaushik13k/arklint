name: Arklint
description: Enforce architectural rules before bad code ever lands.
author: Kaushik K

branding:
  icon: shield
  color: blue

inputs:
  version:
    description: Arklint version to install (default: latest).
    required: false
    default: ""
  strict:
    description: Treat warnings as errors (exit 1 on warnings).
    required: false
    default: "false"
  diff:
    description: Only scan files changed vs this ref (e.g. origin/main). Leave empty to scan all files.
    required: false
    default: ""
  config:
    description: Path to .arklint.yml (auto-discovered if omitted).
    required: false
    default: ""
  working-directory:
    description: Directory to run arklint in.
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Install Arklint
      shell: bash
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          pip install "arklint==${{ inputs.version }}" --quiet
        else
          pip install arklint --quiet
        fi

    - name: Run Arklint
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        ARGS=""
        if [ "${{ inputs.strict }}" = "true" ]; then
          ARGS="$ARGS --strict"
        fi
        if [ -n "${{ inputs.diff }}" ]; then
          ARGS="$ARGS --diff ${{ inputs.diff }}"
        fi
        if [ -n "${{ inputs.config }}" ]; then
          ARGS="$ARGS --config ${{ inputs.config }}"
        fi
        arklint check $ARGS
