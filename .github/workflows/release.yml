name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact-name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: arklint-linux-x86_64
            binary-name: arklint

          - os: macos-13
            artifact-name: arklint-darwin-x86_64
            binary-name: arklint

          - os: macos-14
            artifact-name: arklint-darwin-arm64
            binary-name: arklint

          - os: windows-latest
            artifact-name: arklint-windows-x86_64.exe
            binary-name: arklint.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install arklint and PyInstaller
        run: pip install ".[dev]" pyinstaller

      - name: Build binary
        run: |
          pyinstaller \
            --onefile \
            --name arklint \
            --hidden-import watchdog.observers \
            --hidden-import watchdog.observers.polling \
            --hidden-import watchdog.events \
            src/arklint/__main__.py

      - name: Rename binary to artifact name
        shell: bash
        run: mv dist/${{ matrix.binary-name }} dist/${{ matrix.artifact-name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/${{ matrix.artifact-name }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/arklint-linux-x86_64/arklint-linux-x86_64
            dist/arklint-darwin-x86_64/arklint-darwin-x86_64
            dist/arklint-darwin-arm64/arklint-darwin-arm64
            dist/arklint-windows-x86_64.exe/arklint-windows-x86_64.exe
