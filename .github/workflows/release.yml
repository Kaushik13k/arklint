name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  verify-version:
    name: Verify tag matches package version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check tag matches __version__
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          TAG="${TAG#v}"
          PKG=$(python -c "import sys; sys.path.insert(0, 'src'); from arklint import __version__; print(__version__)")
          echo "Tag version :    $TAG"
          echo "Package version: $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package version $PKG"
            echo "Bump the version in src/arklint/__init__.py before tagging."
            exit 1
          fi
          echo "Versions match: $PKG"

  build:
    needs: verify-version
    name: Build ${{ matrix.artifact-name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: arklint-linux-x86_64
            binary-name: arklint

          - os: macos-14
            artifact-name: arklint-darwin-arm64
            binary-name: arklint

          - os: windows-latest
            artifact-name: arklint-windows-x86_64.exe
            binary-name: arklint.exe

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install arklint and PyInstaller
        run: pip install ".[dev]" pyinstaller

      - name: Build binary
        shell: bash
        run: |
          pyinstaller \
            --onefile \
            --name arklint \
            --hidden-import watchdog.observers \
            --hidden-import watchdog.observers.polling \
            --hidden-import watchdog.events \
            src/arklint/__main__.py

      - name: Rename binary to artifact name
        shell: bash
        run: mv dist/${{ matrix.binary-name }} dist/${{ matrix.artifact-name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/${{ matrix.artifact-name }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/arklint-linux-x86_64/arklint-linux-x86_64
            dist/arklint-darwin-arm64/arklint-darwin-arm64
            dist/arklint-windows-x86_64.exe/arklint-windows-x86_64.exe

  publish-nuget:
    name: Publish NuGet package
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      - name: Pack NuGet tool
        run: dotnet pack dotnet/arklint.csproj -c Release -o nupkg

      - name: Push to NuGet
        run: dotnet nuget push nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
