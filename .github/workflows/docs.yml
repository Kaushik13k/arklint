name: Build Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/content/**"
      - "docs/template.html"
      - "docs/build.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install markdown pymdown-extensions

      - name: Build docs
        working-directory: docs
        run: python build.py

      # Vercel picks up docs/site/ automatically via vercel.json.
      # No deploy step needed here - Vercel deploys on every push to main.
