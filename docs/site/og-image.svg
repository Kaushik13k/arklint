<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>

  <!-- Subtle grid -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.6">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Keystone icon  200×200, centred at (200, 315) -->
  <g transform="translate(100, 215) scale(3.125)">
    <defs>
      <clipPath id="og-lh"><rect x="0" y="0" width="32" height="64"/></clipPath>
      <clipPath id="og-rh"><rect x="32" y="0" width="32" height="64"/></clipPath>
      <mask id="og-km">
        <polygon points="12,11 52,11 52,30 32,54 12,30" fill="white"/>
      </mask>
    </defs>
    <rect width="64" height="64" rx="13" fill="#0f172a"/>
    <g mask="url(#og-km)" clip-path="url(#og-lh)">
      <rect x="0" y="11" width="64" height="10" fill="#ffffff"/>
      <rect x="0" y="21" width="64" height="17" fill="#34d399"/>
      <rect x="0" y="38" width="64" height="20" fill="#fbbf24"/>
    </g>
    <line x1="12" y1="21" x2="32" y2="21" stroke="#0f172a" stroke-width="1.5" opacity="0.35"/>
    <line x1="12" y1="38" x2="32" y2="38" stroke="#0f172a" stroke-width="1.5" opacity="0.35"/>
    <polygon points="12,11 52,11 52,30 32,54 12,30"
             fill="none" stroke="white" stroke-width="3.5" stroke-linejoin="round"
             clip-path="url(#og-rh)" opacity="0.6"/>
    <polygon points="12,11 52,11 52,30 32,54 12,30"
             fill="none" stroke="white" stroke-width="1.5" stroke-linejoin="round" opacity="0.2"/>
  </g>

  <!-- Wordmark -->
  <text x="360" y="280"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="96" font-weight="800" letter-spacing="-3" fill="white">Arklint</text>

  <!-- Tagline -->
  <text x="362" y="348"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="32" font-weight="400" fill="#94a3b8">The architectural rulebook for your codebase.</text>

  <!-- Status pill row -->
  <g transform="translate(362, 406)">
    <!-- clean -->
    <rect width="110" height="36" rx="18" fill="#1e293b"/>
    <circle cx="22" cy="18" r="6" fill="#ffffff"/>
    <text x="36" y="24" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="16" fill="#cbd5e1">clean</text>
    <!-- pass -->
    <rect x="124" width="110" height="36" rx="18" fill="#1e293b"/>
    <circle cx="146" cy="18" r="6" fill="#34d399"/>
    <text x="160" y="24" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="16" fill="#34d399">pass</text>
    <!-- warn -->
    <rect x="248" width="110" height="36" rx="18" fill="#1e293b"/>
    <circle cx="270" cy="18" r="6" fill="#fbbf24"/>
    <text x="284" y="24" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="16" fill="#fbbf24">warn</text>
  </g>

  <!-- Bottom accent bar — three-colour gradient matching zones -->
  <rect x="0" y="606" width="400" height="4" fill="#ffffff" opacity="0.25"/>
  <rect x="400" y="606" width="400" height="4" fill="#34d399"/>
  <rect x="800" y="606" width="400" height="4" fill="#fbbf24"/>
</svg>
